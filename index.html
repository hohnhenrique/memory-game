<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <main class="console">
    <header class="console__header">
      <div class="console__title">
        <span class="console__bracket">[</span>
        MEMÓRIA
        <span class="console__bracket">]</span>
      </div>
      <p class="console__subtitle">teste de reconhecimento // v2.0</p>
    </header>

    <!-- jogador ativo -->
    <div class="player-bar">
      <span class="player-bar__label">jogador:</span>
      <span class="player-bar__name" id="player-name">—</span>
      <button class="player-bar__change" id="change-player-btn" title="trocar jogador">trocar</button>
    </div>

    <!-- HUD -->
    <section class="hud" aria-label="painel de status">
      <div class="hud__stat">
        <span class="hud__label">tempo</span>
        <span class="hud__value" id="timer">00:00</span>
      </div>

      <button class="hud__reset" id="reset-btn" aria-label="reiniciar jogo" title="reiniciar">↺</button>

      <div class="hud__stat">
        <span class="hud__label">jogadas</span>
        <span class="hud__value" id="moves">000</span>
      </div>
    </section>

    <!-- dificuldade -->
    <section class="difficulty" aria-label="nível de dificuldade">
      <button class="difficulty__btn is-active" data-level="easy">fácil</button>
      <button class="difficulty__btn" data-level="medium">médio</button>
      <button class="difficulty__btn" data-level="hard">difícil</button>
    </section>

    <!-- tabuleiro -->
    <section class="board-wrapper">
      <div class="board" id="board" role="grid" aria-label="tabuleiro do jogo da memória"></div>
    </section>

    <p class="status-line" id="status-line">encontre todos os pares</p>

    <!-- botão estatísticas -->
    <div class="stats-toggle-row">
      <button class="stats-toggle-btn" id="stats-toggle-btn">▸ ranking</button>
    </div>

    <!-- painel de estatísticas -->
    <section class="stats-panel" id="stats-panel" hidden>
      <div class="stats-panel__tabs">
        <button class="stats-tab is-active" data-level="easy">fácil</button>
        <button class="stats-tab" data-level="medium">médio</button>
        <button class="stats-tab" data-level="hard">difícil</button>
      </div>
      <div class="stats-panel__content" id="stats-content"></div>
      <button class="stats-clear-btn" id="stats-clear-btn">limpar ranking</button>
    </section>

    <footer class="console__footer">
      <a href="https://github.com/" target="_blank" rel="noopener noreferrer">código-fonte</a>
    </footer>
  </main>

  <!-- modal: cadastro de jogador -->
  <div class="overlay" id="player-overlay">
    <div class="overlay__panel">
      <p class="overlay__message">IDENTIFICAÇÃO</p>
      <p class="overlay__detail">informe seu nome para começar</p>
      <div class="overlay__input-group">
        <input
          class="overlay__input"
          id="player-input"
          type="text"
          maxlength="20"
          placeholder="seu nome..."
          autocomplete="off"
          spellcheck="false"
        />
        <p class="overlay__input-error" id="player-input-error"></p>
      </div>
      <button class="overlay__btn" id="player-confirm-btn">confirmar</button>
    </div>
  </div>

  <!-- modal: fim de jogo -->
  <div class="overlay" id="win-overlay">
    <div class="overlay__panel">
      <p class="overlay__message is-win" id="win-message">PARABÉNS</p>
      <p class="overlay__detail" id="win-detail"></p>
      <div class="win-record" id="win-record"></div>
      <button class="overlay__btn" id="play-again-btn">jogar novamente</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
